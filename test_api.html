<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>API Test</title>
</head>
<body>
    <h1>测试后端 API</h1>
    <button onclick="testAPI()">测试 /api/task/start</button>
    <pre id="result"></pre>

    <script>
        async function testAPI() {
            const resultEl = document.getElementById('result');
            resultEl.textContent = '正在发送请求...';
            
            try {
                const response = await fetch('http://127.0.0.1:8000/api/task/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        type: 'aweme',
                        target: 'https://v.douyin.com/rVrxA6j_71I/',
                        limit: 0
                    })
                });
                
                const data = await response.json();
                resultEl.textContent = '响应成功:\n' + JSON.stringify(data, null, 2);
                console.log('Success:', data);
            } catch (error) {
                resultEl.textContent = '请求失败:\n' + error.message;
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
